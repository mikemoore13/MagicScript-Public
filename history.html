<html>
  <head>
    <style>
    /* body {background-color: powderblue; min-width:300px;} */
    body {  background-color: #181123; min-width:300px; min-height: 200px;}
      button {
        border: none;
        cursor:pointer;
        margin-bottom: 1em;
        padding: 4%;
        width: 20em;
        border-radius: 8px;
      }
    .gradient-text {
      /* Fallback: Set a background color. */
      background-color: red;
      
      /* Create the gradient. */
      background-image: linear-gradient(
         90deg,
      rgba(0, 255, 113, 1) 0%,
        rgba(0, 190, 140, 1) 21%,
        rgba(3, 150, 170, 1) 51%,
        rgba(6, 84, 170, 1) 100%
      );
      
      /* Set the background size and repeat properties. */
      background-size: 100%;
      background-repeat: repeat;

      /* Use the text as a mask for the background. */
      /* This will show the gradient as a text color rather than element bg. */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; 
      -moz-background-clip: text;
      -moz-text-fill-color: transparent;
    }
    h1 {
      font-family: "Archivo Black", sans-serif;
      font-weight: normal;
      font-size: 2.5em;
      text-align: center;
      margin-bottom: 0.5em;
    }
    .contact{
      margin-left: 2.5em;
    }
    p  {color: rgba(3, 150, 170, 1);}
    div {color: white;}

    hr.gradient {
      margin-bottom: 0.5em;
      height: 3px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(
        90deg,
        rgba(0, 255, 113, 1) 0%,
        rgba(0, 190, 140, 1) 21%,
        rgba(3, 150, 170, 1) 51%,
        rgba(6, 84, 170, 1) 100%
      );
    }
    .inputLabel{
      color: white
    }
    #saveMeta{
      margin-bottom: 1em;
    }
    #vstack{
      margin-bottom: 1em;
      margin-left: 1em;
    }
    .groupName {
      margin-bottom: 0.7em;
    }
    ;
    </style>
    </head>
  <body>
    <h1 class="gradient-text">History of Metadata</h1>
    <div id="vstack">
    </div>
  </body>
  <script src="scripts/history.js"></script>

</html>
